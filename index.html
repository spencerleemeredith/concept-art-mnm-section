<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Art Explorer | Monsters & Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Alegreya+SC:wght@400;700&family=IM+Fell+English:ital@0;1&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="output.css">
    <style>
        /* masonry grid layout */
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }

        @media (min-width: 640px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        @media (min-width: 1280px) {
            .masonry-grid {
                column-count: 4;
            }
        }

        /* prevent cards from breaking across columns */
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body
    class="bg-dark text-white font-serif bg-fantasy bg-fixed overflow-x-hidden leading-relaxed min-h-screen flex flex-col">
    <!-- header with logo, search, and filters -->
    <header
        class="sticky top-0 z-50 glass-panel border-b-2 border-accent px-4 sm:px-8 py-4 flex flex-col gap-5 shadow-[0_10px_30px_rgba(0,0,0,0.8)] transition-all duration-300">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full max-w-[1600px] mx-auto">
            <div class="logo-container group cursor-pointer shrink-0">
                <img src="https://images.squarespace-cdn.com/content/v1/603cb2299959d83fcdc26265/1622285461519-BV141EI3H8F0PXBKLNKZ/MAM_Web_Logo.png"
                    alt="Monsters & Memories"
                    class="h-16 sm:h-20 drop-shadow-[0_0_10px_rgba(255,215,0,0.3)] transition-transform duration-500 group-hover:scale-105">
            </div>

            <div class="search-container w-full md:max-w-md relative group">
                <div
                    class="absolute inset-y-0 left-4 flex items-center pointer-events-none opacity-50 group-focus-within:opacity-100 group-focus-within:text-accent transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="searchInput"
                    class="w-full bg-black/60 border border-parchment/40 pl-12 pr-5 py-3 text-white font-sans text-sm outline-none transition-all duration-300 focus:border-accent focus:shadow-[0_0_20px_rgba(255,215,0,0.2)] focus:bg-black/80 tracking-wide placeholder:text-parchment/50 rounded-sm"
                    placeholder="Search the archives...">
            </div>
        </div>

        <div class="flex flex-wrap items-center justify-between gap-4 w-full max-w-[1600px] mx-auto">
            <div class="flex flex-wrap gap-2 sm:gap-3" id="filterBar">
                <button
                    class="filter-chip px-5 py-2 bg-parchment/10 border border-parchment/30 font-display text-base cursor-pointer transition-all duration-300 text-parchment tracking-wide hover:bg-accent/10 hover:border-accent hover:text-accent [&.active]:bg-accent [&.active]:border-accent [&.active]:text-dark [&.active]:font-bold active"
                    data-filter="all">All Chronicles</button>
                <button
                    class="filter-chip px-5 py-2 bg-parchment/10 border border-parchment/30 font-display text-base cursor-pointer transition-all duration-300 text-parchment tracking-wide hover:bg-accent/10 hover:border-accent hover:text-accent [&.active]:bg-accent [&.active]:border-accent [&.active]:text-dark [&.active]:font-bold"
                    data-filter="character">Adventurers</button>
                <button
                    class="filter-chip px-5 py-2 bg-parchment/10 border border-parchment/30 font-display text-base cursor-pointer transition-all duration-300 text-parchment tracking-wide hover:bg-accent/10 hover:border-accent hover:text-accent [&.active]:bg-accent [&.active]:border-accent [&.active]:text-dark [&.active]:font-bold"
                    data-filter="environment">Landscapes</button>
                <button
                    class="filter-chip px-5 py-2 bg-parchment/10 border border-parchment/30 font-display text-base cursor-pointer transition-all duration-300 text-parchment tracking-wide hover:bg-accent/10 hover:border-accent hover:text-accent [&.active]:bg-accent [&.active]:border-accent [&.active]:text-dark [&.active]:font-bold"
                    data-filter="monster">Monsters</button>
                <button
                    class="filter-chip px-5 py-2 bg-parchment/10 border border-parchment/30 font-display text-base cursor-pointer transition-all duration-300 text-parchment tracking-wide hover:bg-accent/10 hover:border-accent hover:text-accent [&.active]:bg-accent [&.active]:border-accent [&.active]:text-dark [&.active]:font-bold"
                    data-filter="equipment">Relics & Gear</button>
            </div>
            <div id="resultCount"
                class="font-sans text-sm text-parchment/80 whitespace-nowrap bg-black/40 px-3 py-1 border border-parchment/20 rounded-sm"
                aria-live="polite"></div>
        </div>
    </header>

    <div class="trim-banner trim-top mb-8 mt-2"></div>

    <!-- gallery container -->
    <main class="flex-grow px-4 sm:px-8 max-w-[1600px] mx-auto w-full pb-16">
        <div class="masonry-grid" id="galleryGrid"></div>
    </main>

    <div class="trim-banner trim-bottom mt-auto"></div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">

        <!-- Top bar -->
        <div class="lightbox-topbar">
            <div class="font-display text-lg text-parchment tracking-widest border border-parchment/30 bg-black/40 px-3 py-1 rounded-sm lightbox-counter" id="lightboxCounter"></div>
            <button
                class="bg-black/50 border border-accent/50 text-accent text-xl w-12 h-12 cursor-pointer flex items-center justify-center transition-all duration-300 hover:bg-accent hover:text-black hover:scale-110 rounded-sm shadow-[0_0_15px_rgba(255,215,0,0)] hover:shadow-[0_0_15px_rgba(255,215,0,0.3)]"
                id="lightboxClose" aria-label="Close (Esc)">✕</button>
        </div>

        <!-- Prev button -->
        <button
            class="absolute top-1/2 -translate-y-1/2 left-4 sm:left-8 text-accent bg-black/60 border border-accent/50 w-14 h-14 cursor-pointer text-3xl flex items-center justify-center transition-all duration-300 hover:bg-accent hover:text-black hover:scale-110 rounded-full backdrop-blur-md z-10"
            id="lightboxPrev" aria-label="Previous image" style="display: flex;">‹</button>

        <!-- Image -->
        <div class="lightbox-content">
            <img src="" alt="" class="lightbox-img" id="lightboxImg">
        </div>

        <!-- Next button -->
        <button
            class="absolute top-1/2 -translate-y-1/2 right-4 sm:right-8 text-accent bg-black/60 border border-accent/50 w-14 h-14 cursor-pointer text-3xl flex items-center justify-center transition-all duration-300 hover:bg-accent hover:text-black hover:scale-110 rounded-full backdrop-blur-md z-10"
            id="lightboxNext" aria-label="Next image" style="display: flex;">›</button>

        <!-- Title -->
        <div class="lightbox-title" id="lightboxTitle"></div>

        <!-- Keyboard hints -->
        <div class="lightbox-hints" aria-hidden="true">
            <span><span class="hint-key">&#8592;</span> Previous</span>
            <span><span class="hint-key">&#8594;</span> Next</span>
            <span><span class="hint-key">Esc</span> Close</span>
            <span>or use the buttons above</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
